<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard | Father & Sons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 50: '#fdfaf1', 100: '#f9f1d5', 400: '#d4af37', 500: '#b8860b', 600: '#996515' },
                        obsidian: '#0f1115',
                        darkSlate: '#1a1d23'
                    },
                    fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .dark-glass { background: rgba(15, 17, 21, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-900 antialiased">
    <nav class="fixed w-full z-50 dark-glass border-b border-white/10 px-8 py-3 flex justify-between items-center shadow-2xl">
        <a href="#" class="h-10 flex items-center">
            <img src="../../assets/fas-logo.png" alt="Logo" class="h-full w-auto brightness-200">
        </a>
        <div class="flex items-center gap-6">
            <div class="hidden md:flex flex-col text-right">
                <span class="text-sm font-semibold text-white">Manager</span>
                <span class="text-[10px] uppercase tracking-widest text-gold-400 font-bold">Portal Access</span>
            </div>
            <div class="h-10 w-10 rounded-full border-2 border-gold-500/30 p-0.5">
                <div class="w-full h-full rounded-full bg-darkSlate flex items-center justify-center">
                    <i class="fas fa-user text-gold-400"></i>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-28 p-8">
        <div class="max-w-7xl mx-auto">
            <div class="mb-10">
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Manager Dashboard</h1>
                <div class="h-1 w-12 bg-gold-500 mt-2 rounded-full"></div>
            </div>
            <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200 p-10 text-center text-slate-500">
                Manager page is ready for content.
            </div>
        </div>
    </main>
</body>
</html>
