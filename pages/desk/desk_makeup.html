<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desk - Make-Up Sessions</title>
    <script src="https://cdn.tailwindcss.com"></script>
 <link rel="icon" href="../../logo/android-chrome-512x512.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/desk-premium.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 50: '#fdfaf1', 100: '#f9f1d5', 400: '#d4af37', 500: '#b8860b', 600: '#996515' },
                        obsidian: '#0f1115',
                        darkSlate: '#1a1d23'
                    },
                    fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
        :root { --nav-bg: #0b0f18; --gold: #d4af37; }
        body { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="desk-app bg-slate-100 text-slate-900">
    <div class="min-h-screen flex">
        <div class="flex-1 flex flex-col min-w-0">
        <div id="deskTopNavMount"></div>
        <main class="desk-main flex-1 px-4 sm:px-6 lg:px-8 py-6">
            <div class="max-w-7xl mx-auto">
                <div class="mb-6 flex flex-wrap items-end justify-between gap-4">
                    <div>
                        <h1 class="text-2xl sm:text-3xl font-bold text-slate-900">Make-Up Sessions</h1>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="desk-stat-card bg-white rounded-2xl border border-slate-200 shadow-sm px-4 py-3 min-w-[150px]">
                            <div class="text-[11px] uppercase tracking-[0.25em] text-slate-400 font-semibold">Students</div>
                            <div id="makeupStudentCount" class="mt-2 text-2xl font-bold text-slate-900">0</div>
                        </div>
                        <div class="desk-stat-card bg-white rounded-2xl border border-slate-200 shadow-sm px-4 py-3 min-w-[150px]">
                            <div class="text-[11px] uppercase tracking-[0.25em] text-slate-400 font-semibold">Red List</div>
                            <div id="makeupRedCount" class="mt-2 text-2xl font-bold text-rose-600">0</div>
                        </div>
                    </div>
                </div>

                <div class="desk-panel bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                    <div class="p-6 bg-rose-50/70 border-b border-rose-100 flex items-center justify-between gap-4 flex-wrap">
                        <div>
                            <h3 class="text-xl font-bold text-slate-800"><i class="fas fa-triangle-exclamation mr-2 text-rose-500"></i>Detailed Make-Up Tracking</h3>
                        </div>
                        <span id="makeupTableCount" class="text-xs text-rose-600 font-semibold">Loading...</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-rose-50/40">
                                <tr>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Student</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Package</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Completed</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Absences</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Remaining</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Threshold</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Next Session</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="makeupTableBody" class="divide-y divide-rose-100">
                                <tr>
                                    <td colspan="8" class="px-6 py-8 text-center text-slate-500">
                                        <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                                        <p>Loading make-up details...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/index.js"></script>
    <script src="../../js/desk/desk_nav.js"></script>
    <script src="../../js/desk/desk_makeup.js"></script>
    <script src="../../js/session_timeout.js"></script>
</body>
</html>
