<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desk Scanner | Father & Sons Music</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/schmich/instascan-builds@master/instascan.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
 <link rel="icon" href="../../logo/android-chrome-512x512.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/desk-premium.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
        :root { --nav-bg: #0b0f18; --gold: #d4af37; }
        body { font-family: 'Space Grotesk', sans-serif; }
        body.desk-scanner-page .desk-topnav #deskTopNavBranch {
            background: rgba(255, 255, 255, 0.14) !important;
            border-color: rgba(255, 255, 255, 0.16) !important;
        }
        body.desk-scanner-page .desk-topnav details > summary > div {
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: rgba(255, 255, 255, 0.12) !important;
        }
        .glass-panel { background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(9, 12, 20, 0.92)); }
        .scanner-frame { border: 2px solid rgba(212, 175, 55, 0.8); border-radius: 14px; position: relative; overflow: hidden; }
        #preview { width: 100%; max-height: 280px; object-fit: cover; transform: scaleX(1); }
        .user-card { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="desk-app desk-scanner-page bg-slate-100 text-slate-900">
    <div class="min-h-screen flex">
        <div class="flex-1 flex flex-col min-w-0">
        <div id="deskTopNavMount"></div>
        <main class="desk-main flex-1 px-4 sm:px-6 lg:px-8 pt-3 pb-5">
            <div class="max-w-6xl mx-auto">
                <div class="mb-4 flex flex-wrap items-end justify-between gap-4">
                    <div>
                        <h1 class="text-2xl sm:text-3xl font-bold text-slate-900">Music Attendance Scanner</h1>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-mono font-bold text-slate-800" id="clock">00:00:00</div>
                        <div class="text-sm text-slate-500" id="date">—</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                    <div class="xl:col-span-2 glass-panel rounded-2xl border border-white/10 p-5 shadow-xl max-w-2xl mx-auto xl:mx-0">
                        <h3 class="text-center text-white font-semibold mb-4">Scan QR Code</h3>
                        <div class="scanner-frame bg-slate-900/60 p-3">
                            <video id="preview" class="rounded-xl"></video>
                        </div>
                        <div class="mt-4">
                            <label for="user_email" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Manual entry by email</label>
                            <input type="email" id="user_email" placeholder="Type student email and press Enter"
                                class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:border-[var(--gold)]">
                        </div>
                        <div class="mt-3 text-sm text-slate-300" id="scannerStatus">Starting camera...</div>
                    </div>

                    <div class="space-y-6">
                        <div class="desk-stat-card bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                            <div class="text-xs uppercase tracking-[0.3em] text-slate-400 font-semibold">Today</div>
                            <div class="mt-4 space-y-2 text-sm">
                                <div class="flex justify-between"><span class="text-slate-500">Check-ins</span><span id="summaryTotal" class="font-semibold">0</span></div>
                                <div class="flex justify-between"><span class="text-slate-500">On Time</span><span id="summaryOnTime" class="font-semibold text-emerald-600">0</span></div>
                                <div class="flex justify-between"><span class="text-slate-500">Invalid</span><span id="summaryInvalid" class="font-semibold text-red-600">0</span></div>
                            </div>
                        </div>
                        <div class="desk-stat-card bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                            <div class="text-xs uppercase tracking-[0.3em] text-slate-400 font-semibold mb-3">Recent check-ins</div>
                            <div id="activeUsers" class="space-y-3 max-h-[320px] overflow-y-auto"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        </div>
    </div>

    <script src="../../js/index.js"></script>
    <script src="../../js/desk/desk_nav.js"></script>
    <script src="../../js/desk/desk_scan.js"></script>
    <script src="../../js/session_timeout.js"></script>
</body>
</html>
