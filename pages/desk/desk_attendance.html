<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desk - Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="../../logo/android-chrome-512x512.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/desk-premium.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 50: '#fdfaf1', 100: '#f9f1d5', 400: '#d4af37', 500: '#b8860b', 600: '#996515' },
                        obsidian: '#0f1115',
                        darkSlate: '#1a1d23'
                    },
                    fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
        :root {--nav-bg: #0b0f18; --gold: #d4af37;}
        body {font-family: 'Space Grotesk', sans-serif;}
        /* ── Attendance page: lock to viewport, no page scroll ── */
        body.desk-app { height: 100vh; overflow: hidden; }
        body.desk-app .desk-main { overflow: hidden; height: calc(100vh - 4rem); display: flex; flex-direction: column; }
        body.desk-app .desk-main > div { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        body.desk-app .desk-main .max-w-7xl { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        /* Day headers row always visible (sticky-ish inside overflow-y-auto) */
        #attendanceCalendarGrid + div { position: sticky; top: 0; background: white; z-index: 1; }
    </style>

</head>
<body class="desk-app bg-slate-100 text-slate-900">
    <div class="min-h-screen flex">
        <div class="flex-1 flex flex-col min-w-0">
        
        <div id="deskTopNavMount"></div>

        <main class="desk-main flex-1 px-3 sm:px-5 py-4">
            <div class="max-w-7xl mx-auto space-y-3">
                <div id="message" class="hidden p-3 rounded-xl text-sm"></div>
                <section class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">

                    <div class="px-4 py-3 border-b border-slate-100 bg-slate-50 flex flex-wrap items-center justify-between gap-2">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-calendar-days text-gold-500 text-sm"></i>
                            <span class="text-sm font-bold text-slate-800">Attendance Calendar</span>
                            <span class="rounded-full bg-slate-200 px-2 py-0.5 text-[11px] font-semibold text-slate-600">
                                <span id="attendanceTableCount">—</span>
                            </span>
                            <span class="rounded-full bg-blue-100 text-blue-700 px-2 py-0.5 text-[11px] font-semibold hidden sm:inline">
                                <span id="attendanceSelectedDateLabel">—</span>
                            </span>
                        </div>
                           <div class="flex gap-2">
                        <div class="desk-stat-card bg-white rounded-xl border border-slate-200 shadow-sm px-3 py-2">
                            <div class="text-[10px] uppercase tracking-widest text-slate-400 font-semibold">Students</div>
                            <div id="attendanceStudentCount" class="text-lg font-bold text-slate-900 leading-tight">0</div>
                        </div>

                        <div class="desk-stat-card bg-white rounded-xl border border-slate-200 shadow-sm px-3 py-2">
                            <div class="text-[10px] uppercase tracking-widest text-slate-400 font-semibold">Make-Up</div>
                            <div id="attendanceMakeupCount" class="text-lg font-bold text-rose-600 leading-tight">0</div>
                        </div>
                    </div>

                        <div class="flex flex-wrap items-center gap-1.5">
                            <button id="attendanceOpenUpcomingBtn" type="button"
                                class="inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-semibold text-slate-600 hover:bg-slate-50 transition">
                                <i class="fas fa-clock text-blue-500 text-[11px]"></i>
                                <span class="hidden sm:inline">Upcoming</span>
                            </button>
                            <button id="attendanceOpenTodayBtn" type="button"
                                class="inline-flex items-center gap-1.5 rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1.5 text-xs font-semibold text-emerald-700 hover:bg-emerald-100 transition">
                                <i class="fas fa-user-check text-[11px]"></i>
                                <span class="hidden sm:inline">Who's Today</span>
                            </button>
                            <button id="attendanceOpenMakeupBtn" type="button"
                                class="inline-flex items-center gap-1.5 rounded-full border border-rose-200 bg-rose-50 px-3 py-1.5 text-xs font-semibold text-rose-700 hover:bg-rose-100 transition">
                                <i class="fas fa-triangle-exclamation text-[11px]"></i>
                                <span class="hidden sm:inline">Make-Up</span>
                            </button>
                            <button id="attendanceOpenGuardianAbsenceBtn" type="button"
                                class="inline-flex items-center gap-1.5 rounded-full border border-amber-200 bg-amber-50 px-3 py-1.5 text-xs font-semibold text-amber-700 hover:bg-amber-100 transition">
                                <i class="fas fa-notes-medical text-[11px]"></i>
                                <span class="hidden sm:inline">Absence</span>
                                <span id="attendanceGuardianAbsenceCount" class="rounded-full bg-white/80 px-1.5 py-0.5 text-[10px] font-black text-amber-700">0</span>
                            </button>
                            <button id="attendanceOpenRoomTrackerBtn" type="button"
                                class="inline-flex items-center gap-1.5 rounded-full border border-violet-200 bg-violet-50 px-3 py-1.5 text-xs font-semibold text-violet-700 hover:bg-violet-100 transition">
                                <i class="fas fa-door-closed text-[11px]"></i>
                                <span class="hidden sm:inline">Rooms</span>
                            </button>
                        </div>
                    </div>

                    <!-- ── Two-column body: calendar | day schedule ── -->
                    <div class="grid xl:grid-cols-[1.35fr_0.9fr]" style="height: calc(100vh - 11rem); min-height: 520px;">

                        <!-- Calendar column -->
                        <div class="border-b xl:border-b-0 xl:border-r border-slate-100 flex flex-col overflow-hidden">
                            <!-- Month nav -->
                            <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between gap-3 shrink-0">
                                <div id="attendanceCalendarMonthLabel" class="text-base font-black text-slate-900">Loading…</div>
                                <div class="flex items-center gap-1.5">
                                    <button id="attendancePrevMonthBtn" type="button"
                                        class="grid h-8 w-8 place-items-center rounded-xl border border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100 transition">
                                        <i class="fas fa-chevron-left text-xs"></i>
                                    </button>
                                    <button id="attendanceTodayBtn" type="button"
                                        class="rounded-xl border border-slate-200 bg-white px-3 py-1.5 text-xs font-semibold text-slate-700 hover:bg-slate-50 transition">
                                        Today
                                    </button>
                                    <button id="attendanceNextMonthBtn" type="button"
                                        class="grid h-8 w-8 place-items-center rounded-xl border border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100 transition">
                                        <i class="fas fa-chevron-right text-xs"></i>
                                    </button>
                                </div>
                            </div>
                            <!-- Calendar grid — scrolls if needed but day headers always visible -->
                            <div class="flex-1 overflow-y-auto p-3">
                                <div class="grid grid-cols-7 mb-2 text-center text-[10px] font-bold uppercase tracking-widest text-slate-400">
                                    <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
                                </div>
                                <div id="attendanceCalendarGrid" class="grid grid-cols-7 gap-1.5">
                                    <div class="col-span-7 rounded-xl border border-dashed border-slate-200 px-4 py-8 text-center text-sm text-slate-400">
                                        Loading calendar…
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Day schedule column — always fills remaining height, inner scroll -->
                        <div class="flex flex-col overflow-hidden">
                            <div class="px-4 py-3 border-b border-slate-100 shrink-0">
                                <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Day Schedule</div>
                                <div id="attendanceSelectedDateTitle" class="mt-1 text-base font-black text-slate-900 leading-tight">Loading…</div>
                                <div id="attendanceSelectedDateMeta" class="text-xs text-slate-500 mt-0.5">Pulling branch sessions…</div>
                            </div>
                            <div id="attendanceSelectedDateList"
                                class="flex-1 overflow-y-auto p-3 space-y-3 overscroll-contain">
                                <div class="rounded-xl border border-dashed border-slate-200 px-4 py-8 text-center text-sm text-slate-400">
                                    Loading sessions…
                                </div>
                            </div>
                        </div>

                    </div>
                </section>

            </div>
        </main>
        </div>
    </div>

    <div id="attendanceRoomTrackerModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 p-4 backdrop-blur-sm">
        <div class="relative w-full max-w-6xl overflow-hidden rounded-[2rem] border border-slate-200 bg-white shadow-2xl">
            <button id="attendanceCloseRoomTrackerBtn" type="button" class="absolute right-5 top-5 z-10 grid h-11 w-11 place-items-center rounded-full border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition">
                <i class="fas fa-times"></i>
            </button>
            <section id="roomOccupancyTracker" class="overflow-hidden">
                <div class="p-6 bg-slate-50/60 border-b border-slate-200 flex items-center justify-between gap-4 flex-wrap">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800"><i class="fas fa-door-closed mr-2 text-rose-500"></i>Room Occupancy Tracker</h3>
                    </div>
                    <div class="flex items-center gap-3 flex-wrap pr-16">
                        <span id="roomOccupancyUpdatedAt" class="text-xs text-slate-500">Preparing live tracker...</span>
                        <button id="roomOccupancyRefreshBtn" type="button" class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-50 transition">
                            <i class="fas fa-rotate-right"></i>
                            Refresh
                        </button>
                    </div>
                </div>
                <div class="max-h-[75vh] overflow-y-auto p-5">
                    <div id="roomOccupancySummary" class="grid gap-3 md:grid-cols-4"></div>
                    <div id="roomOccupancyGrid" class="mt-4 grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                        <div class="col-span-full rounded-2xl border border-dashed border-slate-200 px-4 py-10 text-center text-sm text-slate-500">
                            Loading room occupancy...
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/index.js"></script>
    <script src="../../js/desk/desk_nav.js"></script>
    <script src="../../js/branch_room_occupancy.js"></script>
    <script src="../../js/desk/desk_attendance.js"></script>
    <script src="../../js/session_timeout.js"></script>
</body>
</html>
